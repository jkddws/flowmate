version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowmate
      POSTGRES_USER: flowmate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flowmate_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://flowmate:${POSTGRES_PASSWORD:-flowmate_dev}@db:5432/flowmate
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    depends_on:
      - db

volumes:
  pgdata:
